<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tienda Virtual | Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f3f4f6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
        }
        .user-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button, .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #2563eb;
        }
        .btn-outline:hover {
            background: #eff6ff;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        /* Productos */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
        }
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #e5e7eb;
        }
        .product-info {
            padding: 16px;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2563eb;
            margin: 8px 0;
        }
        .product-stock {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 12px;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 24px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .badge {
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            background: #e5e7eb;
            color: #1f2937;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab.active {
            background: #2563eb;
            color: white;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .admin-table th {
            background: #f9fafb;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mt-4 {
            margin-top: 16px;
        }
        .text-center {
            text-align: center;
        }
        .error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        @media (max-width: 640px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo">🛍️ MiTienda</div>
        <div class="user-area" id="userArea"></div>
    </div>

    <!-- Pantalla de login/registro -->
    <div id="authScreen">
        <div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 24px;">
            <h2 style="text-align: center;">Bienvenido</h2>
            <div class="tabs" style="justify-content: center;">
                <div class="tab active" data-tab="login">Iniciar sesión</div>
                <div class="tab" data-tab="register">Registrarse</div>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword">
                </div>
                <button id="doLogin" style="width:100%">Ingresar</button>
                <div id="loginError" class="error text-center mt-4"></div>
            </div>
            <div id="registerForm" style="display:none">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="regName" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword">
                </div>
                <button id="doRegister" style="width:100%">Crear cuenta</button>
                <div id="registerError" class="error text-center mt-4"></div>
            </div>
        </div>
    </div>

    <!-- Panel principal (después de login) -->
    <div id="mainPanel" style="display:none">
        <div class="tabs" id="roleTabs">
            <div class="tab active" data-view="productos">Productos</div>
            <div class="tab" data-view="carrito">Carrito <span id="cartCountBadge" class="badge">0</span></div>
            <div class="tab" data-view="pedidos">Mis pedidos</div>
            <div class="tab admin-only" data-view="adminProductos" style="display:none">Admin: Productos</div>
            <div class="tab admin-only" data-view="adminPedidos" style="display:none">Admin: Pedidos</div>
        </div>

        <!-- Vistas -->
        <div id="viewProductos">
            <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Productos</h2>
                <button id="refreshProductosBtn" class="btn-outline">🔄 Actualizar</button>
            </div>
            <div id="productosList" class="products-grid"></div>
        </div>

        <div id="viewCarrito" style="display:none">
            <h2>Mi Carrito</h2>
            <div id="carritoItems"></div>
            <div id="carritoTotal" style="font-size: 1.3rem; font-weight: bold; margin: 20px 0;"></div>
            <button id="checkoutBtn" class="btn">Finalizar compra</button>
        </div>

        <div id="viewPedidos" style="display:none">
            <h2>Mis Pedidos</h2>
            <div id="pedidosList"></div>
        </div>

        <div id="viewAdminProductos" style="display:none">
            <h2>Gestionar Productos</h2>
            <button id="newProductoBtn" class="btn">+ Nuevo producto</button>
            <div class="mt-4">
                <table class="admin-table">
                    <thead>
                        <tr><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th>
                    </thead>
                    <tbody id="adminProductosTable"></tbody>
                </table>
            </div>
        </div>

        <div id="viewAdminPedidos" style="display:none">
            <h2>Todos los Pedidos</h2>
            <div id="adminPedidosList"></div>
        </div>
    </div>
</div>

<script>
    // Configuración Supabase (proporcionada)
    const SUPABASE_URL = 'https://qumvjavnauppcabzsrjn.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_secret_OQEeUEUg9kfcxJOcqWsekQ_xjYGKqh5';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Estado global
    let currentUser = null;
    let currentUserRole = null;
    let cart = []; // { productoId, producto, cantidad }
    let productos = [];

    // ========== Helper: Obtener perfil del usuario ==========
    async function loadUserProfile(userId) {
        const { data, error } = await supabase
            .from('perfiles')
            .select('nombre, rol')
            .eq('id', userId)
            .single();
        if (error) {
            console.error(error);
            return { rol: 'cliente', nombre: '' };
        }
        return data;
    }

    // ========== Autenticación ==========
    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const profile = await loadUserProfile(currentUser.id);
            currentUserRole = profile.rol;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userArea').innerHTML = `
                <span>👋 ${profile.nombre || currentUser.email}</span>
                <button id="logoutBtn" class="btn-outline">Cerrar sesión</button>
            `;
            document.getElementById('logoutBtn').onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };
            // Mostrar pestañas de admin si corresponde
            if (currentUserRole === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
            await loadProductos();
            await renderUI();
        } else {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('mainPanel').style.display = 'none';
        }
    }

    // ========== Productos ==========
    async function loadProductos() {
        const { data, error } = await supabase
            .from('productos')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) console.error(error);
        else productos = data;
        renderProductos();
        if (currentUserRole === 'admin') renderAdminProductosTable();
    }

    function renderProductos() {
        const container = document.getElementById('productosList');
        if (!container) return;
        container.innerHTML = productos.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.imagen_url || 'https://via.placeholder.com/200x150?text=Producto'}" alt="${p.nombre}">
                <div class="product-info">
                    <div class="product-name">${p.nombre}</div>
                    <div class="product-price">S/ ${p.precio}</div>
                    <div class="product-stock">Stock: ${p.stock}</div>
                    ${p.stock > 0 ? `<button class="add-to-cart" data-id="${p.id}">Añadir al carrito</button>` : '<button disabled>Agotado</button>'}
                </div>
            </div>
        `).join('');
        // Eventos añadir al carrito
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const prodId = btn.dataset.id;
                addToCart(prodId);
            });
        });
    }

    // ========== Carrito ==========
    function addToCart(productoId) {
        const producto = productos.find(p => p.id === productoId);
        if (!producto) return;
        const existing = cart.find(item => item.productoId === productoId);
        if (existing) {
            if (existing.cantidad + 1 > producto.stock) {
                alert('No hay suficiente stock');
                return;
            }
            existing.cantidad++;
        } else {
            if (producto.stock < 1) {
                alert('Producto agotado');
                return;
            }
            cart.push({ productoId, producto, cantidad: 1 });
        }
        updateCarritoUI();
        saveCartToLocal();
    }

    function updateCarritoUI() {
        const container = document.getElementById('carritoItems');
        const totalSpan = document.getElementById('carritoTotal');
        const badge = document.getElementById('cartCountBadge');
        if (!container) return;

        if (cart.length === 0) {
            container.innerHTML = '<p>El carrito está vacío</p>';
            totalSpan.innerText = 'Total: S/ 0.00';
            badge.innerText = '0';
            return;
        }

        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            const subtotal = item.producto.precio * item.cantidad;
            total += subtotal;
            html += `
                <div class="cart-item">
                    <div><strong>${item.producto.nombre}</strong><br> S/ ${item.producto.precio} x ${item.cantidad}</div>
                    <div>
                        S/ ${subtotal.toFixed(2)}
                        <button class="cart-remove" data-id="${item.productoId}" style="background:#ef4444; margin-left:8px;">X</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Total: S/ ${total.toFixed(2)}`;
        badge.innerText = cart.reduce((acc, i) => acc + i.cantidad, 0);

        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const prodId = btn.dataset.id;
                cart = cart.filter(i => i.productoId !== prodId);
                updateCarritoUI();
                saveCartToLocal();
            });
        });
    }

    function saveCartToLocal() {
        if (currentUser) {
            localStorage.setItem(`cart_${currentUser.id}`, JSON.stringify(cart));
        }
    }

    function loadCartFromLocal() {
        if (currentUser) {
            const stored = localStorage.getItem(`cart_${currentUser.id}`);
            if (stored) cart = JSON.parse(stored);
            else cart = [];
            updateCarritoUI();
        }
    }

    async function checkout() {
        if (cart.length === 0) return alert('Carrito vacío');
        // Verificar stock actualizado
        for (let item of cart) {
            const { data, error } = await supabase
                .from('productos')
                .select('stock')
                .eq('id', item.productoId)
                .single();
            if (error || data.stock < item.cantidad) {
                alert(`Stock insuficiente para ${item.producto.nombre}`);
                return;
            }
        }
        // Crear pedido
        const total = cart.reduce((acc, i) => acc + (i.producto.precio * i.cantidad), 0);
        const { data: pedido, error: pedidoError } = await supabase
            .from('pedidos')
            .insert({ usuario_id: currentUser.id, total })
            .select()
            .single();
        if (pedidoError) {
            alert('Error al crear el pedido');
            console.error(pedidoError);
            return;
        }
        // Insertar detalles_pedido
        const detalles = cart.map(item => ({
            pedido_id: pedido.id,
            producto_id: item.productoId,
            cantidad: item.cantidad,
            precio_momento: item.producto.precio
        }));
        const { error: detallesError } = await supabase.from('detalles_pedido').insert(detalles);
        if (detallesError) {
            alert('Error al registrar detalles');
            console.error(detallesError);
            return;
        }
        // Actualizar stock usando la función (si existe) o manualmente
        for (let item of cart) {
            await supabase.rpc('decrementar_stock', { prod_id: item.productoId, cantidad: item.cantidad });
        }
        // Limpiar carrito
        cart = [];
        saveCartToLocal();
        updateCarritoUI();
        alert('Compra realizada con éxito');
        await loadProductos(); // refrescar stocks
        renderProductos();
        if (currentUserRole === 'admin') renderAdminProductosTable();
        // Cambiar a vista de pedidos
        showView('pedidos');
        await loadUserPedidos();
    }

    // ========== Pedidos (cliente) ==========
    async function loadUserPedidos() {
        const { data, error } = await supabase
            .from('pedidos')
            .select(`
                id,
                total,
                estado,
                created_at,
                detalles_pedido (
                    producto_id,
                    cantidad,
                    precio_momento,
                    productos (nombre)
                )
            `)
            .eq('usuario_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        const container = document.getElementById('pedidosList');
        if (!container) return;
        if (data.length === 0) {
            container.innerHTML = '<p>No has realizado pedidos aún.</p>';
            return;
        }
        container.innerHTML = data.map(pedido => `
            <div style="background:white; padding:16px; border-radius:16px; margin-bottom:16px;">
                <div><strong>Pedido #${pedido.id.slice(0,8)}</strong> - ${new Date(pedido.created_at).toLocaleString()} - Estado: ${pedido.estado}</div>
                <div>Total: S/ ${pedido.total}</div>
                <div>Productos: ${pedido.detalles_pedido.map(d => `${d.productos?.nombre} x ${d.cantidad}`).join(', ')}</div>
            </div>
        `).join('');
    }

    // ========== Admin: Productos ==========
    async function renderAdminProductosTable() {
        const tbody = document.getElementById('adminProductosTable');
        if (!tbody) return;
        tbody.innerHTML = productos.map(p => `
            <tr>
                <td>${p.nombre}</td>
                <td>S/ ${p.precio}</td>
                <td>${p.stock}</td>
                <td class="flex">
                    <button class="btn-outline btn-sm edit-product" data-id="${p.id}">Editar</button>
                    <button class="btn-danger btn-sm delete-product" data-id="${p.id}">Eliminar</button>
                </td>
             </tr>
        `).join('');
        document.querySelectorAll('.edit-product').forEach(btn => {
            btn.addEventListener('click', () => editProductoForm(btn.dataset.id));
        });
        document.querySelectorAll('.delete-product').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('¿Eliminar producto?')) {
                    const { error } = await supabase.from('productos').delete().eq('id', btn.dataset.id);
                    if (error) alert('Error al eliminar');
                    else await loadProductos();
                }
            });
        });
    }

    function editProductoForm(productoId) {
        const producto = productos.find(p => p.id === productoId);
        const nombre = prompt('Nombre:', producto.nombre);
        if (!nombre) return;
        const precio = parseFloat(prompt('Precio:', producto.precio));
        if (isNaN(precio)) return;
        const stock = parseInt(prompt('Stock:', producto.stock));
        if (isNaN(stock)) return;
        const imagen = prompt('URL de imagen:', producto.imagen_url || '');
        supabase.from('productos').update({ nombre, precio, stock, imagen_url: imagen }).eq('id', productoId)
            .then(() => loadProductos());
    }

    document.getElementById('newProductoBtn')?.addEventListener('click', async () => {
        const nombre = prompt('Nombre del producto');
        if (!nombre) return;
        const precio = parseFloat(prompt('Precio'));
        if (isNaN(precio)) return;
        const stock = parseInt(prompt('Stock inicial', 0));
        const { error } = await supabase.from('productos').insert([{ nombre, precio, stock }]);
        if (error) alert('Error al crear producto');
        else loadProductos();
    });

    // ========== Admin: Pedidos ==========
    async function loadAdminPedidos() {
        const { data, error } = await supabase
            .from('pedidos')
            .select(`
                id,
                total,
                estado,
                created_at,
                usuario_id,
                detalles_pedido (
                    producto_id,
                    cantidad,
                    precio_momento,
                    productos (nombre)
                )
            `)
            .order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        const container = document.getElementById('adminPedidosList');
        if (!container) return;
        container.innerHTML = data.map(pedido => `
            <div style="background:white; padding:16px; border-radius:16px; margin-bottom:16px;">
                <div><strong>Pedido #${pedido.id.slice(0,8)}</strong> - ${new Date(pedido.created_at).toLocaleString()}</div>
                <div>Usuario: ${pedido.usuario_id}</div>
                <div>Total: S/ ${pedido.total}</div>
                <div>Estado: 
                    <select data-id="${pedido.id}" class="order-status">
                        <option ${pedido.estado === 'pendiente' ? 'selected' : ''}>pendiente</option>
                        <option ${pedido.estado === 'pagado' ? 'selected' : ''}>pagado</option>
                        <option ${pedido.estado === 'enviado' ? 'selected' : ''}>enviado</option>
                        <option ${pedido.estado === 'entregado' ? 'selected' : ''}>entregado</option>
                    </select>
                    <button class="update-status" data-id="${pedido.id}">Actualizar</button>
                </div>
                <div>Productos: ${pedido.detalles_pedido.map(d => `${d.productos?.nombre} x ${d.cantidad}`).join(', ')}</div>
            </div>
        `).join('');
        document.querySelectorAll('.update-status').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const orderId = btn.dataset.id;
                const select = document.querySelector(`.order-status[data-id="${orderId}"]`);
                const newStatus = select.value;
                const { error } = await supabase.from('pedidos').update({ estado: newStatus }).eq('id', orderId);
                if (error) alert('Error al actualizar estado');
                else loadAdminPedidos();
            });
        });
    }

    // ========== Navegación ==========
    function showView(viewId) {
        document.querySelectorAll('#mainPanel > div[id^="view"]').forEach(div => div.style.display = 'none');
        document.getElementById(`view${viewId.charAt(0).toUpperCase() + viewId.slice(1)}`).style.display = 'block';
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelector(`.tab[data-view="${viewId}"]`).classList.add('active');

        if (viewId === 'carrito') updateCarritoUI();
        if (viewId === 'pedidos') loadUserPedidos();
        if (viewId === 'adminProductos') renderAdminProductosTable();
        if (viewId === 'adminPedidos') loadAdminPedidos();
    }

    async function renderUI() {
        if (!currentUser) return;
        loadCartFromLocal();
        // Configurar pestañas
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const view = tab.dataset.view;
                if (view) showView(view);
            });
        });
        // Mostrar vista inicial (productos)
        showView('productos');
    }

    // ========== Eventos de autenticación ==========
    document.getElementById('doLogin')?.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) document.getElementById('loginError').innerText = error.message;
        else checkSession();
    });

    document.getElementById('doRegister')?.addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const nombre = document.getElementById('regName').value;
        const { error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { nombre } }
        });
        if (error) document.getElementById('registerError').innerText = error.message;
        else {
            alert('Registro exitoso, ahora inicia sesión');
            document.querySelector('[data-tab="login"]').click();
        }
    });

    // Toggle login/register tabs
    document.querySelectorAll('[data-tab]').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('loginForm').style.display = target === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = target === 'register' ? 'block' : 'none';
        });
    });

    document.getElementById('checkoutBtn')?.addEventListener('click', checkout);
    document.getElementById('refreshProductosBtn')?.addEventListener('click', loadProductos);

    // ========== Inicialización ==========
    checkSession();
</script>
</body>
</html>
