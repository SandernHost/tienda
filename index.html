<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual | Admin y Cliente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (estilos sin cambios) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f3f4f6; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 15px 25px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #2563eb; }
        button, .btn { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        button:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; border: 1px solid #2563eb; color: #2563eb; }
        .btn-outline:hover { background: #eff6ff; }
        .btn-danger { background: #ef4444; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img { width: 100%; height: 180px; object-fit: cover; background: #e5e7eb; }
        .product-info { padding: 16px; }
        .product-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 6px; }
        .product-price { font-size: 1.3rem; font-weight: bold; color: #2563eb; margin: 8px 0; }
        .product-stock { font-size: 0.8rem; color: #6b7280; margin-bottom: 12px; }
        .cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .cart-content { background: white; max-width: 500px; width: 90%; border-radius: 24px; padding: 24px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e5e7eb; }
        .badge { background: #f3f4f6; padding: 2px 8px; border-radius: 30px; font-size: 0.7rem; }
        .flex { display: flex; gap: 8px; flex-wrap: wrap; }
        .mt-4 { margin-top: 16px; }
        .error { color: #ef4444; font-size: 0.8rem; margin-top: 5px; }
        .orders-list { background: white; border-radius: 16px; padding: 20px; margin-top: 30px; }
        .order-item { border-bottom: 1px solid #e5e7eb; padding: 12px 0; }
        .order-id { font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: #e5e7eb; color: #1f2937; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .tab.active { background: #2563eb; color: white; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        .admin-table th { background: #f9fafb; }
        .admin-product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .admin-product-img:hover {
            transform: scale(2);
            z-index: 10;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 12px; }
        @media (max-width: 640px) { .header { flex-direction: column; gap: 15px; text-align: center; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🛍️ Tienda Virtual</div>
        <div class="user-area" id="userArea"></div>
    </div>

    <!-- Pantalla de login/registro (sin cambios) -->
    <div id="authScreen">
        <div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 24px;">
            <h2 style="text-align: center;">Bienvenido</h2>
            <div class="tabs" style="justify-content: center;">
                <div class="tab active" data-tab="login">Iniciar sesión</div>
                <div class="tab" data-tab="register">Registrarse</div>
            </div>
            <div id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="correo@ejemplo.com"></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword"></div>
                <button id="doLogin" style="width:100%">Ingresar</button>
                <div id="loginError" class="error text-center mt-4"></div>
            </div>
            <div id="registerForm" style="display:none">
                <div class="form-group"><label>Nombre</label><input type="text" id="regName" placeholder="Tu nombre"></div>
                <div class="form-group"><label>Email</label><input type="email" id="regEmail"></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="regPassword"></div>
                <button id="doRegister" style="width:100%">Crear cuenta</button>
                <div id="registerError" class="error text-center mt-4"></div>
            </div>
        </div>
    </div>

    <!-- Panel principal (sin cambios en el HTML, solo la función JS) -->
    <div id="mainPanel" style="display:none">
        <div class="tabs" id="roleTabs">
            <div class="tab client-only" data-view="productos">Productos</div>
            <div class="tab client-only" data-view="carrito">Carrito <span id="cartCountBadge" class="badge">0</span></div>
            <div class="tab client-only" data-view="pedidos">Mis pedidos</div>
            <div class="tab admin-only" data-view="adminProductos" style="display:none">Admin: Productos</div>
            <div class="tab admin-only" data-view="adminPedidos" style="display:none">Admin: Pedidos</div>
        </div>

        <div id="viewProductos">
            <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Productos</h2>
                <button id="refreshBtn" class="btn-outline">🔄 Actualizar</button>
            </div>
            <div id="productsList" class="products-grid"></div>
        </div>

        <div id="viewCarrito" style="display:none">
            <h2>Mi Carrito</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="font-size:1.3rem;font-weight:bold;margin:20px 0;"></div>
            <button id="checkoutBtn" class="btn">Finalizar compra</button>
        </div>

        <div id="viewPedidos" style="display:none">
            <h2>Mis Pedidos</h2>
            <div id="ordersList"></div>
        </div>

        <div id="viewAdminProductos" style="display:none">
            <h2>Gestionar Productos</h2>
            <button id="newProductoBtn" class="btn">+ Nuevo producto</button>
            <div class="mt-4">
                <table class="admin-table">
                    <thead><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></thead>
                    <tbody id="adminProductosTable"></tbody>
                追赶
            </div>
        </div>

        <div id="viewAdminPedidos" style="display:none">
            <h2>Todos los Pedidos</h2>
            <div id="adminPedidosList"></div>
        </div>
    </div>
</div>

<!-- Modal del carrito (solo para cliente) -->
<div id="cartModal" class="cart-modal">
    <div class="cart-content">
        <h3>Mi Carrito</h3>
        <div id="cartItemsModal"></div>
        <div id="cartTotalModal" style="font-weight:bold;margin:20px 0;"></div>
        <button id="checkoutBtnModal" class="btn">Finalizar compra</button>
        <button id="closeCartBtn" style="margin-top:10px;background:#6b7280;">Cerrar</button>
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN SUPABASE ==========
    const SUPABASE_URL = 'https://runzokxeezsayssmqpnz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Betjh1F-RC1UuHtUfSkwqg_l5uf_Aq5';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ========== ESTADO ==========
    let currentUser = null;
    let productos = [];
    let cart = [];

    // ========== LOGIN (sin cambios) ==========
    async function login(email, password) {
        const loginErrorDiv = document.getElementById('loginError');
        if (loginErrorDiv) loginErrorDiv.innerText = '';
        const { data, error } = await supabaseClient
            .from('perfiles')
            .select('id, nombre, rol, contraseña')
            .eq('nombre', email)
            .maybeSingle();
        if (error) {
            console.error('Error consultando perfiles:', error);
            if (loginErrorDiv) loginErrorDiv.innerText = 'Error de conexión con Supabase';
            return false;
        }
        if (!data) {
            if (loginErrorDiv) loginErrorDiv.innerText = 'Usuario no encontrado';
            return false;
        }
        if (data.contraseña !== password) {
            if (loginErrorDiv) loginErrorDiv.innerText = 'Contraseña incorrecta';
            return false;
        }
        currentUser = { id: data.id, email: email, nombre: data.nombre, rol: data.rol };
        return true;
    }

    async function register(email, password, nombre) {
        const registerErrorDiv = document.getElementById('registerError');
        if (registerErrorDiv) registerErrorDiv.innerText = '';
        const { data: exist, error: existError } = await supabaseClient
            .from('perfiles')
            .select('id')
            .eq('nombre', email)
            .maybeSingle();
        if (exist) {
            if (registerErrorDiv) registerErrorDiv.innerText = 'El usuario ya existe';
            return false;
        }
        const newId = crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString() + Math.random());
        const { error: insertError } = await supabaseClient
            .from('perfiles')
            .insert({ id: newId, nombre: email, rol: 'cliente', contraseña: password });
        if (insertError) {
            if (registerErrorDiv) registerErrorDiv.innerText = 'Error al crear usuario: ' + insertError.message;
            return false;
        }
        return true;
    }

    // ========== PRODUCTOS (sin cambios) ==========
    async function loadProductos() {
        const { data, error } = await supabaseClient
            .from('productos')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        productos = data;
        renderProductos();
        if (currentUser && currentUser.rol === 'admin') renderAdminProductosTable();
    }

    function renderProductos() {
        const container = document.getElementById('productsList');
        if (!container) return;
        if (productos.length === 0) {
            container.innerHTML = '<p>No hay productos disponibles.</p>';
            return;
        }
        container.innerHTML = productos.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.imagen_url || 'https://picsum.photos/200/150'}" alt="${p.nombre}" onerror="this.src='https://picsum.photos/200/150'">
                <div class="product-info">
                    <div class="product-name">${p.nombre}</div>
                    <div class="product-price">S/ ${p.precio}</div>
                    <div class="product-stock">Stock: ${p.stock}</div>
                    ${currentUser && currentUser.rol === 'cliente' && p.stock > 0 
                        ? `<button class="add-to-cart" data-id="${p.id}">Añadir al carrito</button>` 
                        : (p.stock <= 0 ? '<button disabled>Agotado</button>' : '')}
                </div>
            </div>
        `).join('');
        if (currentUser && currentUser.rol === 'cliente') {
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', () => addToCart(btn.dataset.id));
            });
        }
    }

    // ========== CARRITO (sin cambios) ==========
    function addToCart(productoId) {
        const producto = productos.find(p => p.id === productoId);
        if (!producto) return;
        const existing = cart.find(item => item.productoId === productoId);
        if (existing) {
            if (existing.cantidad + 1 > producto.stock) { alert('Stock insuficiente'); return; }
            existing.cantidad++;
        } else {
            if (producto.stock < 1) { alert('Agotado'); return; }
            cart.push({ productoId, producto, cantidad: 1 });
        }
        updateCartUI(); saveCart(); updateCartCountBadge();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItemsModal');
        const totalSpan = document.getElementById('cartTotalModal');
        if (!container) return;
        if (cart.length === 0) {
            container.innerHTML = '<p>Carrito vacío</p>';
            totalSpan.innerText = 'Total: S/ 0.00';
            return;
        }
        let total = 0, html = '';
        cart.forEach(item => {
            const subtotal = item.producto.precio * item.cantidad;
            total += subtotal;
            html += `
                <div class="cart-item">
                    <div><strong>${item.producto.nombre}</strong><br> S/ ${item.producto.precio} x ${item.cantidad}</div>
                    <div>S/ ${subtotal.toFixed(2)} <button class="cart-remove" data-id="${item.productoId}" style="background:#ef4444;">X</button></div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Total: S/ ${total.toFixed(2)}`;
        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                cart = cart.filter(i => i.productoId !== btn.dataset.id);
                updateCartUI(); saveCart(); updateCartCountBadge();
            });
        });
    }

    function updateCartCountBadge() {
        const total = cart.reduce((acc, i) => acc + i.cantidad, 0);
        const badge = document.getElementById('cartCountBadge');
        if (badge) badge.innerText = total;
    }

    function saveCart() {
        if (currentUser) localStorage.setItem(`cart_${currentUser.id}`, JSON.stringify(cart));
    }

    function loadCart() {
        if (currentUser && currentUser.rol === 'cliente') {
            const stored = localStorage.getItem(`cart_${currentUser.id}`);
            cart = stored ? JSON.parse(stored) : [];
            updateCartUI(); updateCartCountBadge();
        }
    }

    // ========== COMPRA (sin cambios) ==========
    async function checkout() {
        if (cart.length === 0) { alert('Carrito vacío'); return; }
        for (let item of cart) {
            const { data, error } = await supabaseClient
                .from('productos')
                .select('stock')
                .eq('id', item.productoId)
                .single();
            if (error || data.stock < item.cantidad) {
                alert(`Stock insuficiente para ${item.producto.nombre}`);
                return;
            }
        }
        const total = cart.reduce((a, i) => a + i.producto.precio * i.cantidad, 0);
        const { data: pedido, error: pedidoError } = await supabaseClient
            .from('pedidos')
            .insert({ usuario_id: currentUser.id, total, estado: 'pendiente' })
            .select()
            .single();
        if (pedidoError) {
            console.error('Error pedido:', pedidoError);
            alert('Error al crear pedido: ' + (pedidoError.message || ''));
            return;
        }
        const detalles = cart.map(item => ({
            pedido_id: pedido.id,
            producto_id: item.productoId,
            cantidad: item.cantidad,
            precio_momento: item.producto.precio
        }));
        const { error: detallesError } = await supabaseClient.from('detalles_pedido').insert(detalles);
        if (detallesError) {
            console.error('Error detalles:', detallesError);
            alert('Error al guardar productos: ' + (detallesError.message || ''));
            return;
        }
        for (let item of cart) {
            await supabaseClient.rpc('decrementar_stock', { prod_id: item.productoId, cantidad: item.cantidad });
        }
        cart = [];
        saveCart(); updateCartUI(); updateCartCountBadge();
        alert('¡Compra realizada!');
        document.getElementById('cartModal').style.display = 'none';
        await loadProductos();
        await loadUserOrders();
    }

    // ========== PEDIDOS DEL CLIENTE (sin cambios) ==========
    async function loadUserOrders() {
        const container = document.getElementById('ordersList');
        if (!container) return;
        container.innerHTML = 'Cargando pedidos...';
        const { data, error } = await supabaseClient
            .from('pedidos')
            .select(`
                id,
                total,
                estado,
                created_at,
                detalles_pedido (
                    cantidad,
                    precio_momento,
                    productos (nombre)
                )
            `)
            .eq('usuario_id', currentUser.id)
            .order('created_at', { ascending: false })
            .limit(10);
        if (error) { container.innerHTML = '<p>Error al cargar pedidos.</p>'; return; }
        if (data.length === 0) { container.innerHTML = '<p>No hay pedidos aún.</p>'; return; }
        container.innerHTML = data.map(p => `
            <div class="order-item">
                <div class="order-id">Pedido #${p.id.slice(0,8)}</div>
                <div>Fecha: ${new Date(p.created_at).toLocaleString()}</div>
                <div>Total: S/ ${p.total}</div>
                <div>Estado: ${p.estado}</div>
                <div>Productos: ${p.detalles_pedido.map(d => `${d.productos?.nombre} x ${d.cantidad}`).join(', ')}</div>
            </div>
        `).join('');
    }

    // ========== ADMIN: GESTIÓN DE PRODUCTOS (sin cambios) ==========
    async function renderAdminProductosTable() {
        const tbody = document.getElementById('adminProductosTable');
        if (!tbody) return;
        tbody.innerHTML = productos.map(p => `
            <tr>
                <td><img class="admin-product-img" src="${p.imagen_url || 'https://picsum.photos/50/50'}" alt="${p.nombre}" onerror="this.src='https://picsum.photos/50/50'"></td>
                <td>${p.nombre}</td>
                <td>S/ ${p.precio}</td>
                <td>${p.stock}</td>
                <td class="flex">
                    <button class="btn-outline edit-product" data-id="${p.id}">Editar</button>
                    <button class="btn-danger delete-product" data-id="${p.id}">Eliminar</button>
                </td>
             </tr>
        `).join('');
        document.querySelectorAll('.edit-product').forEach(btn => btn.addEventListener('click', () => editProductoForm(btn.dataset.id)));
        document.querySelectorAll('.delete-product').forEach(btn => btn.addEventListener('click', async () => {
            if (confirm('¿Eliminar producto?')) { await supabaseClient.from('productos').delete().eq('id', btn.dataset.id); await loadProductos(); }
        }));
    }

    function editProductoForm(productoId) {
        const p = productos.find(p => p.id === productoId);
        const nombre = prompt('Nombre:', p.nombre); if (!nombre) return;
        const precio = parseFloat(prompt('Precio:', p.precio)); if (isNaN(precio)) return;
        const stock = parseInt(prompt('Stock:', p.stock)); if (isNaN(stock)) return;
        const imagen = prompt('URL imagen:', p.imagen_url || '');
        supabaseClient.from('productos').update({ nombre, precio, stock, imagen_url: imagen }).eq('id', productoId).then(() => loadProductos());
    }

    document.getElementById('newProductoBtn')?.addEventListener('click', async () => {
        const nombre = prompt('Nombre del producto'); if (!nombre) return;
        const precio = parseFloat(prompt('Precio')); if (isNaN(precio)) return;
        const stock = parseInt(prompt('Stock inicial', 0));
        const { error } = await supabaseClient.from('productos').insert([{ nombre, precio, stock }]);
        if (error) alert('Error al crear producto');
        else loadProductos();
    });

    // ========== ADMIN: VER TODOS LOS PEDIDOS (MODIFICADA) ==========
    async function loadAdminPedidos() {
        const container = document.getElementById('adminPedidosList');
        if (!container) return;
        container.innerHTML = 'Cargando pedidos...';
        const { data, error } = await supabaseClient
            .from('pedidos')
            .select(`
                id,
                usuario_id,
                total,
                estado,
                created_at,
                detalles_pedido (
                    cantidad,
                    precio_momento,
                    productos (nombre)
                ),
                perfiles!inner (nombre)
            `)
            .order('created_at', { ascending: false });
        if (error) {
            console.error('Error cargando pedidos admin:', error);
            container.innerHTML = '<p>Error al cargar pedidos.</p>';
            return;
        }
        if (data.length === 0) {
            container.innerHTML = '<p>No hay pedidos aún.</p>';
            return;
        }
        container.innerHTML = data.map(p => {
            // Obtener el nombre del usuario desde la relación perfiles
            const userName = p.perfiles && p.perfiles.length > 0 ? p.perfiles[0].nombre : p.usuario_id;
            return `
                <div class="order-item">
                    <div class="order-id">Pedido #${p.id.slice(0,8)}</div>
                    <div>Usuario: ${userName}</div>
                    <div>Fecha: ${new Date(p.created_at).toLocaleString()}</div>
                    <div>Total: S/ ${p.total}</div>
                    <div>Estado: 
                        <select data-id="${p.id}" class="order-status">
                            <option ${p.estado === 'pendiente' ? 'selected' : ''}>pendiente</option>
                            <option ${p.estado === 'pagado' ? 'selected' : ''}>pagado</option>
                            <option ${p.estado === 'enviado' ? 'selected' : ''}>enviado</option>
                            <option ${p.estado === 'entregado' ? 'selected' : ''}>entregado</option>
                        </select>
                        <button class="update-status" data-id="${p.id}">Actualizar</button>
                    </div>
                    <div>Productos: ${p.detalles_pedido.map(d => `${d.productos?.nombre} x ${d.cantidad}`).join(', ')}</div>
                </div>
            `;
        }).join('');
        // Reasignar eventos
        document.querySelectorAll('.update-status').forEach(btn => btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const select = document.querySelector(`.order-status[data-id="${id}"]`);
            const newStatus = select.value;
            await supabaseClient.from('pedidos').update({ estado: newStatus }).eq('id', id);
            loadAdminPedidos();
        }));
    }

    // ========== NAVEGACIÓN (sin cambios) ==========
    function showView(viewId) {
        document.querySelectorAll('#mainPanel > div[id^="view"]').forEach(div => div.style.display = 'none');
        const targetDiv = document.getElementById(`view${viewId.charAt(0).toUpperCase() + viewId.slice(1)}`);
        if (targetDiv) targetDiv.style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const activeTab = document.querySelector(`.tab[data-view="${viewId}"]`);
        if (activeTab) activeTab.classList.add('active');
        if (viewId === 'carrito') { updateCartUI(); document.getElementById('cartModal').style.display = 'flex'; }
        if (viewId === 'pedidos') loadUserOrders();
        if (viewId === 'adminProductos') renderAdminProductosTable();
        if (viewId === 'adminPedidos') loadAdminPedidos();
    }

    async function renderUI() {
        if (!currentUser) return;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        const userArea = document.getElementById('userArea');
        if (userArea) {
            userArea.innerHTML = `<span>👋 ${currentUser.nombre} (${currentUser.rol})</span><button id="logoutBtn" class="btn-outline">Cerrar sesión</button>`;
            document.getElementById('logoutBtn').onclick = () => { currentUser = null; location.reload(); };
        }
        const clientTabs = document.querySelectorAll('.client-only');
        const adminTabs = document.querySelectorAll('.admin-only');
        if (currentUser.rol === 'admin') {
            clientTabs.forEach(tab => tab.style.display = 'none');
            adminTabs.forEach(tab => tab.style.display = 'inline-block');
            showView('adminProductos');
        } else {
            clientTabs.forEach(tab => tab.style.display = 'inline-block');
            adminTabs.forEach(tab => tab.style.display = 'none');
            showView('productos');
        }
        await loadProductos();
        if (currentUser.rol === 'cliente') loadCart();
    }

    // ========== EVENTOS (sin cambios) ==========
    document.getElementById('doLogin').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        const ok = await login(email, pass);
        if (ok) renderUI();
    });
    document.getElementById('doRegister').addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPassword').value;
        const name = document.getElementById('regName').value;
        const ok = await register(email, pass, name);
        if (ok) { alert('Registro exitoso, ahora inicia sesión'); document.querySelector('[data-tab="login"]').click(); }
    });
    document.querySelectorAll('[data-tab]').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('loginForm').style.display = target === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = target === 'register' ? 'block' : 'none';
        });
    });
    document.getElementById('checkoutBtn').addEventListener('click', checkout);
    document.getElementById('checkoutBtnModal').addEventListener('click', checkout);
    document.getElementById('closeCartBtn').addEventListener('click', () => document.getElementById('cartModal').style.display = 'none');
    const viewCartBtn = document.getElementById('viewCartBtn');
    if (viewCartBtn) viewCartBtn.addEventListener('click', () => { updateCartUI(); document.getElementById('cartModal').style.display = 'flex'; });
    document.getElementById('refreshBtn').addEventListener('click', loadProductos);
    document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { if (tab.dataset.view) showView(tab.dataset.view); }));

    // Inicialización
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('mainPanel').style.display = 'none';
</script>
</body>
</html>
