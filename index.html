<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual | Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos igual que antes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f3f4f6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
        }
        button, .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #2563eb;
        }
        .btn-outline:hover {
            background: #eff6ff;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
        }
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #e5e7eb;
        }
        .product-info {
            padding: 16px;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2563eb;
            margin: 8px 0;
        }
        .product-stock {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 12px;
        }
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .cart-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 24px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .badge {
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mt-4 {
            margin-top: 16px;
        }
        .error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        .orders-list {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
        }
        .order-item {
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 0;
        }
        .order-id {
            font-weight: bold;
        }
        @media (max-width: 640px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🛍️ Tienda Virtual | Sin Login</div>
        <div>
            <button id="viewCartBtn" class="btn-outline">🛒 Carrito (<span id="cartCount">0</span>)</button>
        </div>
    </div>

    <div>
        <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Productos</h2>
            <button id="refreshBtn" class="btn-outline">🔄 Actualizar</button>
        </div>
        <div id="productsList" class="products-grid"></div>
    </div>

    <div id="ordersSection" class="orders-list">
        <h3>📦 Últimos pedidos</h3>
        <div id="ordersList">Cargando...</div>
    </div>
</div>

<!-- Modal del carrito -->
<div id="cartModal" class="cart-modal">
    <div class="cart-content">
        <h3>Mi Carrito</h3>
        <div id="cartItems"></div>
        <div id="cartTotal" style="font-size: 1.3rem; font-weight: bold; margin: 20px 0;"></div>
        <button id="checkoutBtn" class="btn">Finalizar compra</button>
        <button id="closeCartBtn" style="margin-top: 10px; background: #6b7280;">Cerrar</button>
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN SUPABASE ==========
    const SUPABASE_URL = 'https://runzokxeezsayssmqpnz.supabase.co';
    // ✅ Clave anónima (pública) – la correcta para usar en el navegador
    const SUPABASE_ANON_KEY = 'sb_publishable_Betjh1F-RC1UuHtUfSkwqg_l5uf_Aq5';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // UUID del usuario invitado (debe existir en auth.users)
    const GUEST_USER_ID = 'b39e0d1a-de9f-4af4-8f39-fd8ff4c421cf';

    let productos = [];
    let cart = [];

    async function loadProductos() {
        try {
            const { data, error } = await supabaseClient
                .from('productos')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;
            productos = data;
            renderProductos();
        } catch (error) {
            console.error('Error cargando productos:', error);
            document.getElementById('productsList').innerHTML = `<div class="error">Error: ${error.message}</div>`;
        }
    }

    function renderProductos() {
        const container = document.getElementById('productsList');
        if (!container) return;
        if (productos.length === 0) {
            container.innerHTML = '<p>No hay productos disponibles. Asegúrate de tener datos en la tabla "productos".</p>';
            return;
        }
        container.innerHTML = productos.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.imagen_url || 'https://via.placeholder.com/200x150?text=Producto'}" alt="${p.nombre}">
                <div class="product-info">
                    <div class="product-name">${p.nombre}</div>
                    <div class="product-price">S/ ${p.precio}</div>
                    <div class="product-stock">Stock: ${p.stock}</div>
                    ${p.stock > 0 ? `<button class="add-to-cart" data-id="${p.id}">Añadir al carrito</button>` : '<button disabled>Agotado</button>'}
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const prodId = btn.dataset.id;
                addToCart(prodId);
            });
        });
    }

    function addToCart(productoId) {
        const producto = productos.find(p => p.id === productoId);
        if (!producto) return;
        const existing = cart.find(item => item.productoId === productoId);
        if (existing) {
            if (existing.cantidad + 1 > producto.stock) {
                alert('No hay suficiente stock');
                return;
            }
            existing.cantidad++;
        } else {
            if (producto.stock < 1) {
                alert('Producto agotado');
                return;
            }
            cart.push({ productoId, producto, cantidad: 1 });
        }
        updateCartUI();
        saveCartToLocal();
        updateCartCountBadge();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        const totalSpan = document.getElementById('cartTotal');
        if (!container) return;

        if (cart.length === 0) {
            container.innerHTML = '<p>El carrito está vacío</p>';
            totalSpan.innerText = 'Total: S/ 0.00';
            return;
        }

        let total = 0;
        let html = '';
        cart.forEach(item => {
            const subtotal = item.producto.precio * item.cantidad;
            total += subtotal;
            html += `
                <div class="cart-item">
                    <div><strong>${item.producto.nombre}</strong><br> S/ ${item.producto.precio} x ${item.cantidad}</div>
                    <div>
                        S/ ${subtotal.toFixed(2)}
                        <button class="cart-remove" data-id="${item.productoId}" style="background:#ef4444; margin-left:8px;">X</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerText = `Total: S/ ${total.toFixed(2)}`;

        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const prodId = btn.dataset.id;
                cart = cart.filter(i => i.productoId !== prodId);
                updateCartUI();
                saveCartToLocal();
                updateCartCountBadge();
            });
        });
    }

    function updateCartCountBadge() {
        const total = cart.reduce((acc, i) => acc + i.cantidad, 0);
        document.getElementById('cartCount').innerText = total;
    }

    function saveCartToLocal() {
        localStorage.setItem('cart_guest', JSON.stringify(cart));
    }

    function loadCartFromLocal() {
        const stored = localStorage.getItem('cart_guest');
        cart = stored ? JSON.parse(stored) : [];
        updateCartUI();
        updateCartCountBadge();
    }

    async function checkout() {
        if (cart.length === 0) {
            alert('Carrito vacío');
            return;
        }

        for (let item of cart) {
            const { data, error } = await supabaseClient
                .from('productos')
                .select('stock')
                .eq('id', item.productoId)
                .single();
            if (error || data.stock < item.cantidad) {
                alert(`Stock insuficiente para ${item.producto.nombre}`);
                return;
            }
        }

        const total = cart.reduce((acc, i) => acc + (i.producto.precio * i.cantidad), 0);
        const { data: pedido, error: pedidoError } = await supabaseClient
            .from('pedidos')
            .insert({ usuario_id: GUEST_USER_ID, total, estado: 'pendiente' })
            .select()
            .single();

        if (pedidoError) {
            alert('Error al procesar la compra.');
            return;
        }

        const detalles = cart.map(item => ({
            pedido_id: pedido.id,
            producto_id: item.productoId,
            cantidad: item.cantidad,
            precio_momento: item.producto.precio
        }));
        const { error: detallesError } = await supabaseClient.from('detalles_pedido').insert(detalles);
        if (detallesError) {
            alert('Error al guardar los productos.');
            return;
        }

        for (let item of cart) {
            await supabaseClient.rpc('decrementar_stock', { prod_id: item.productoId, cantidad: item.cantidad });
        }

        cart = [];
        saveCartToLocal();
        updateCartUI();
        updateCartCountBadge();
        alert('¡Compra realizada con éxito!');
        document.getElementById('cartModal').style.display = 'none';
        await loadProductos();
        await loadLastOrders();
    }

    async function loadLastOrders() {
        const container = document.getElementById('ordersList');
        if (!container) return;
        container.innerHTML = 'Cargando pedidos...';
        const { data, error } = await supabaseClient
            .from('pedidos')
            .select(`
                id,
                total,
                estado,
                created_at,
                detalles_pedido (
                    cantidad,
                    precio_momento,
                    productos (nombre)
                )
            `)
            .eq('usuario_id', GUEST_USER_ID)
            .order('created_at', { ascending: false })
            .limit(5);
        if (error) {
            container.innerHTML = '<p>Error al cargar pedidos.</p>';
            return;
        }
        if (data.length === 0) {
            container.innerHTML = '<p>No hay pedidos aún.</p>';
            return;
        }
        container.innerHTML = data.map(pedido => `
            <div class="order-item">
                <div class="order-id">Pedido #${pedido.id.slice(0,8)}</div>
                <div>Fecha: ${new Date(pedido.created_at).toLocaleString()}</div>
                <div>Total: S/ ${pedido.total}</div>
                <div>Estado: ${pedido.estado}</div>
                <div>Productos: ${pedido.detalles_pedido.map(d => `${d.productos?.nombre} x ${d.cantidad}`).join(', ')}</div>
            </div>
        `).join('');
    }

    document.getElementById('viewCartBtn').onclick = () => {
        updateCartUI();
        document.getElementById('cartModal').style.display = 'flex';
    };
    document.getElementById('closeCartBtn').onclick = () => {
        document.getElementById('cartModal').style.display = 'none';
    };
    document.getElementById('checkoutBtn').onclick = checkout;
    document.getElementById('refreshBtn').onclick = loadProductos;

    loadCartFromLocal();
    loadProductos();
    loadLastOrders();
</script>
</body>
</html>
