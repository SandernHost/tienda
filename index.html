<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual | Login con tabla perfiles</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (todos los estilos, incluyendo .form-group, input, etc.) ... */
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 12px; }
        button { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        /* ... resto de estilos ... */
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🛍️ Tienda Virtual</div>
        <div class="user-area" id="userArea"></div>
    </div>

    <div id="authScreen">
        <div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 24px;">
            <h2 style="text-align: center;">Bienvenido</h2>
            <div class="tabs" style="justify-content: center;">
                <div class="tab active" data-tab="login">Iniciar sesión</div>
                <div class="tab" data-tab="register">Registrarse</div>
            </div>
            <div id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="correo@ejemplo.com"></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword"></div>
                <button id="doLogin" style="width:100%">Ingresar</button>
                <div id="loginError" class="error text-center mt-4"></div>
            </div>
            <div id="registerForm" style="display:none">
                <div class="form-group"><label>Nombre</label><input type="text" id="regName" placeholder="Tu nombre"></div>
                <div class="form-group"><label>Email</label><input type="email" id="regEmail"></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="regPassword"></div>
                <button id="doRegister" style="width:100%">Crear cuenta</button>
                <div id="registerError" class="error text-center mt-4"></div>
            </div>
        </div>
    </div>

    <!-- ... resto del código (mainPanel, modales, script) ... -->
</div>
</body>
</html>
