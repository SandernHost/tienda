<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual | Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f3f4f6;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2563eb;
        }
        .user-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button, .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        button:hover {
            background: #1d4ed8;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #2563eb;
        }
        .btn-outline:hover {
            background: #eff6ff;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        /* Productos */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
        }
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #e5e7eb;
        }
        .product-info {
            padding: 16px;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2563eb;
            margin: 8px 0;
        }
        .product-stock {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 12px;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 24px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .badge {
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            background: #e5e7eb;
            color: #1f2937;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab.active {
            background: #2563eb;
            color: white;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .admin-table th {
            background: #f9fafb;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mt-4 {
            margin-top: 16px;
        }
        .text-center {
            text-align: center;
        }
        .error {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 5px;
        }
        @media (max-width: 640px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo">🛍️ MiTienda</div>
        <div class="user-area" id="userArea"></div>
    </div>

    <!-- Pantalla de login/registro -->
    <div id="authScreen">
        <div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 24px;">
            <h2 style="text-align: center;">Bienvenido</h2>
            <div class="tabs" style="justify-content: center;">
                <div class="tab active" data-tab="login">Iniciar sesión</div>
                <div class="tab" data-tab="register">Registrarse</div>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword">
                </div>
                <button id="doLogin" style="width:100%">Ingresar</button>
                <div id="loginError" class="error text-center mt-4"></div>
            </div>
            <div id="registerForm" style="display:none">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="regName" placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword">
                </div>
                <button id="doRegister" style="width:100%">Crear cuenta</button>
                <div id="registerError" class="error text-center mt-4"></div>
            </div>
        </div>
    </div>

    <!-- Panel principal (después de login) -->
    <div id="mainPanel" style="display:none">
        <div class="tabs" id="roleTabs">
            <div class="tab active" data-view="products">Productos</div>
            <div class="tab" data-view="cart">Carrito <span id="cartCountBadge" class="badge">0</span></div>
            <div class="tab" data-view="orders">Mis pedidos</div>
            <div class="tab admin-only" data-view="adminProducts" style="display:none">Admin: Productos</div>
            <div class="tab admin-only" data-view="adminOrders" style="display:none">Admin: Pedidos</div>
        </div>

        <!-- Vistas -->
        <div id="viewProducts">
            <div class="flex" style="justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Productos</h2>
                <button id="refreshProductsBtn" class="btn-outline">🔄 Actualizar</button>
            </div>
            <div id="productsList" class="products-grid"></div>
        </div>

        <div id="viewCart" style="display:none">
            <h2>Mi Carrito</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="font-size: 1.3rem; font-weight: bold; margin: 20px 0;"></div>
            <button id="checkoutBtn" class="btn">Finalizar compra</button>
        </div>

        <div id="viewOrders" style="display:none">
            <h2>Mis Pedidos</h2>
            <div id="ordersList"></div>
        </div>

        <div id="viewAdminProducts" style="display:none">
            <h2>Gestionar Productos</h2>
            <button id="newProductBtn" class="btn">+ Nuevo producto</button>
            <div class="mt-4">
                <table class="admin-table">
                    <thead>
                        <tr><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th>
                    </thead>
                    <tbody id="adminProductsTable"></tbody>
                </table>
            </div>
        </div>

        <div id="viewAdminOrders" style="display:none">
            <h2>Todos los Pedidos</h2>
            <div id="adminOrdersList"></div>
        </div>
    </div>
</div>

<script>
    // Configuración Supabase (REEMPLAZAR con tus credenciales)
    const SUPABASE_URL = 'https://qumvjavnauppcabzsrjn.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_secret_OQEeUEUg9kfcxJOcqWsekQ_xjYGKqh5';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Estado global
    let currentUser = null;
    let currentUserRole = null;
    let cart = []; // { productId, product, quantity }
    let products = [];

    // ========== Helper: Cargar perfil ==========
    async function loadUserProfile(userId) {
        const { data, error } = await supabase
            .from('profiles')
            .select('role, name')
            .eq('id', userId)
            .single();
        if (error) {
            console.error(error);
            return { role: 'client', name: '' };
        }
        return data;
    }

    // ========== Autenticación ==========
    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const profile = await loadUserProfile(currentUser.id);
            currentUserRole = profile.role;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            document.getElementById('userArea').innerHTML = `
                <span>👋 ${profile.name || currentUser.email}</span>
                <button id="logoutBtn" class="btn-outline">Cerrar sesión</button>
            `;
            document.getElementById('logoutBtn').onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };
            // Mostrar pestañas de admin si corresponde
            if (currentUserRole === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
            await loadProducts();
            await renderUI();
        } else {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('mainPanel').style.display = 'none';
        }
    }

    // ========== Productos ==========
    async function loadProducts() {
        const { data, error } = await supabase
            .from('products')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) console.error(error);
        else products = data;
        renderProducts();
        if (currentUserRole === 'admin') renderAdminProductsTable();
    }

    function renderProducts() {
        const container = document.getElementById('productsList');
        if (!container) return;
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <img class="product-img" src="${p.image_url || 'https://via.placeholder.com/200x150?text=Producto'}" alt="${p.name}">
                <div class="product-info">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">S/ ${p.price}</div>
                    <div class="product-stock">Stock: ${p.stock}</div>
                    ${p.stock > 0 ? `<button class="add-to-cart" data-id="${p.id}">Añadir al carrito</button>` : '<button disabled>Agotado</button>'}
                </div>
            </div>
        `).join('');
        // Eventos añadir al carrito
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const prodId = btn.dataset.id;
                addToCart(prodId);
            });
        });
    }

    // ========== Carrito ==========
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.productId === productId);
        if (existing) {
            if (existing.quantity + 1 > product.stock) {
                alert('No hay suficiente stock');
                return;
            }
            existing.quantity++;
        } else {
            if (product.stock < 1) {
                alert('Producto agotado');
                return;
            }
            cart.push({ productId, product, quantity: 1 });
        }
        updateCartUI();
        saveCartToLocal();
    }

    function updateCartUI() {
        const cartContainer = document.getElementById('cartItems');
        const totalSpan = document.getElementById('cartTotal');
        const badge = document.getElementById('cartCountBadge');
        if (!cartContainer) return;

        if (cart.length === 0) {
            cartContainer.innerHTML = '<p>El carrito está vacío</p>';
            totalSpan.innerText = 'Total: S/ 0.00';
            badge.innerText = '0';
            return;
        }

        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            const subtotal = item.product.price * item.quantity;
            total += subtotal;
            html += `
                <div class="cart-item">
                    <div><strong>${item.product.name}</strong><br> S/ ${item.product.price} x ${item.quantity}</div>
                    <div>
                        S/ ${subtotal.toFixed(2)}
                        <button class="cart-remove" data-id="${item.productId}" style="background:#ef4444; margin-left:8px;">X</button>
                    </div>
                </div>
            `;
        });
        cartContainer.innerHTML = html;
        totalSpan.innerText = `Total: S/ ${total.toFixed(2)}`;
        badge.innerText = cart.reduce((acc, i) => acc + i.quantity, 0);

        document.querySelectorAll('.cart-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const prodId = btn.dataset.id;
                cart = cart.filter(i => i.productId !== prodId);
                updateCartUI();
                saveCartToLocal();
            });
        });
    }

    function saveCartToLocal() {
        localStorage.setItem('cart_' + currentUser.id, JSON.stringify(cart));
    }

    function loadCartFromLocal() {
        const stored = localStorage.getItem('cart_' + currentUser.id);
        if (stored) cart = JSON.parse(stored);
        else cart = [];
        updateCartUI();
    }

    async function checkout() {
        if (cart.length === 0) return alert('Carrito vacío');
        // Verificar stock actualizado
        for (let item of cart) {
            const { data, error } = await supabase
                .from('products')
                .select('stock')
                .eq('id', item.productId)
                .single();
            if (error || data.stock < item.quantity) {
                alert(`Stock insuficiente para ${item.product.name}`);
                return;
            }
        }
        // Crear pedido
        const total = cart.reduce((acc, i) => acc + (i.product.price * i.quantity), 0);
        const { data: order, error: orderError } = await supabase
            .from('orders')
            .insert({ user_id: currentUser.id, total })
            .select()
            .single();
        if (orderError) {
            alert('Error al crear el pedido');
            console.error(orderError);
            return;
        }
        // Insertar items
        const items = cart.map(item => ({
            order_id: order.id,
            product_id: item.productId,
            quantity: item.quantity,
            price_at_time: item.product.price
        }));
        const { error: itemsError } = await supabase.from('order_items').insert(items);
        if (itemsError) {
            alert('Error al registrar items');
            console.error(itemsError);
            return;
        }
        // Actualizar stock de productos
        for (let item of cart) {
            await supabase.rpc('decrease_stock', { prod_id: item.productId, qty: item.quantity });
        }
        // Limpiar carrito
        cart = [];
        saveCartToLocal();
        updateCartUI();
        alert('Compra realizada con éxito');
        await loadProducts(); // refrescar stocks
        renderProducts();
        if (currentUserRole === 'admin') renderAdminProductsTable();
        // Cambiar a vista de pedidos
        showView('orders');
        await loadUserOrders();
    }

    // ========== Pedidos (cliente) ==========
    async function loadUserOrders() {
        const { data, error } = await supabase
            .from('orders')
            .select(`
                id,
                total,
                status,
                created_at,
                order_items (product_id, quantity, price_at_time, products(name))
            `)
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        const container = document.getElementById('ordersList');
        if (!container) return;
        if (data.length === 0) {
            container.innerHTML = '<p>No has realizado pedidos aún.</p>';
            return;
        }
        container.innerHTML = data.map(order => `
            <div style="background:white; padding:16px; border-radius:16px; margin-bottom:16px;">
                <div><strong>Pedido #${order.id.slice(0,8)}</strong> - ${new Date(order.created_at).toLocaleString()} - Estado: ${order.status}</div>
                <div>Total: S/ ${order.total}</div>
                <div>Productos: ${order.order_items.map(i => `${i.products?.name} x ${i.quantity}`).join(', ')}</div>
            </div>
        `).join('');
    }

    // ========== Admin: Productos ==========
    async function renderAdminProductsTable() {
        const tbody = document.getElementById('adminProductsTable');
        if (!tbody) return;
        tbody.innerHTML = products.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>S/ ${p.price}</td>
                <td>${p.stock}</td>
                <td class="flex">
                    <button class="btn-outline edit-product" data-id="${p.id}">Editar</button>
                    <button class="btn-danger delete-product" data-id="${p.id}">Eliminar</button>
                </td>
            </tr>
        `).join('');
        document.querySelectorAll('.edit-product').forEach(btn => {
            btn.addEventListener('click', () => editProductForm(btn.dataset.id));
        });
        document.querySelectorAll('.delete-product').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm('¿Eliminar producto?')) {
                    const { error } = await supabase.from('products').delete().eq('id', btn.dataset.id);
                    if (error) alert('Error al eliminar');
                    else await loadProducts();
                }
            });
        });
    }

    function editProductForm(productId) {
        const product = products.find(p => p.id === productId);
        const name = prompt('Nombre:', product.name);
        if (!name) return;
        const price = parseFloat(prompt('Precio:', product.price));
        if (isNaN(price)) return;
        const stock = parseInt(prompt('Stock:', product.stock));
        if (isNaN(stock)) return;
        const image = prompt('URL de imagen:', product.image_url || '');
        supabase.from('products').update({ name, price, stock, image_url: image }).eq('id', productId)
            .then(() => loadProducts());
    }

    document.getElementById('newProductBtn')?.addEventListener('click', async () => {
        const name = prompt('Nombre del producto');
        if (!name) return;
        const price = parseFloat(prompt('Precio'));
        if (isNaN(price)) return;
        const stock = parseInt(prompt('Stock inicial', 0));
        const { error } = await supabase.from('products').insert([{ name, price, stock }]);
        if (error) alert('Error al crear producto');
        else loadProducts();
    });

    // ========== Admin: Pedidos ==========
    async function loadAdminOrders() {
        const { data, error } = await supabase
            .from('orders')
            .select(`
                id,
                total,
                status,
                created_at,
                user_id,
                order_items (product_id, quantity, price_at_time, products(name))
            `)
            .order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }
        const container = document.getElementById('adminOrdersList');
        if (!container) return;
        container.innerHTML = data.map(order => `
            <div style="background:white; padding:16px; border-radius:16px; margin-bottom:16px;">
                <div><strong>Pedido #${order.id.slice(0,8)}</strong> - ${new Date(order.created_at).toLocaleString()}</div>
                <div>Usuario: ${order.user_id}</div>
                <div>Total: S/ ${order.total}</div>
                <div>Estado: 
                    <select data-id="${order.id}" class="order-status">
                        <option ${order.status === 'pending' ? 'selected' : ''}>pending</option>
                        <option ${order.status === 'paid' ? 'selected' : ''}>paid</option>
                        <option ${order.status === 'shipped' ? 'selected' : ''}>shipped</option>
                        <option ${order.status === 'delivered' ? 'selected' : ''}>delivered</option>
                    </select>
                    <button class="update-status" data-id="${order.id}">Actualizar</button>
                </div>
                <div>Productos: ${order.order_items.map(i => `${i.products?.name} x ${i.quantity}`).join(', ')}</div>
            </div>
        `).join('');
        document.querySelectorAll('.update-status').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const orderId = btn.dataset.id;
                const select = document.querySelector(`.order-status[data-id="${orderId}"]`);
                const newStatus = select.value;
                const { error } = await supabase.from('orders').update({ status: newStatus }).eq('id', orderId);
                if (error) alert('Error al actualizar estado');
                else loadAdminOrders();
            });
        });
    }

    // ========== Navegación ==========
    function showView(viewId) {
        document.querySelectorAll('#mainPanel > div[id^="view"]').forEach(div => div.style.display = 'none');
        document.getElementById(`view${viewId.charAt(0).toUpperCase() + viewId.slice(1)}`).style.display = 'block';
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelector(`.tab[data-view="${viewId}"]`).classList.add('active');

        if (viewId === 'cart') updateCartUI();
        if (viewId === 'orders') loadUserOrders();
        if (viewId === 'adminProducts') renderAdminProductsTable();
        if (viewId === 'adminOrders') loadAdminOrders();
    }

    // ========== UI general ==========
    async function renderUI() {
        if (!currentUser) return;
        loadCartFromLocal();
        // Configurar pestañas
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const view = tab.dataset.view;
                if (view) showView(view);
            });
        });
        // Mostrar vista inicial (productos)
        showView('products');
    }

    // ========== Eventos de auth ==========
    document.getElementById('doLogin')?.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) document.getElementById('loginError').innerText = error.message;
        else checkSession();
    });

    document.getElementById('doRegister')?.addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const name = document.getElementById('regName').value;
        const { error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { name } }
        });
        if (error) document.getElementById('registerError').innerText = error.message;
        else {
            alert('Registro exitoso, ahora inicia sesión');
            document.querySelector('[data-tab="login"]').click();
        }
    });

    // Toggle login/register tabs
    document.querySelectorAll('[data-tab]').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.querySelectorAll('[data-tab]').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('loginForm').style.display = target === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = target === 'register' ? 'block' : 'none';
        });
    });

    document.getElementById('checkoutBtn')?.addEventListener('click', checkout);
    document.getElementById('refreshProductsBtn')?.addEventListener('click', loadProducts);

    // ========== Inicialización ==========
    checkSession();
</script>
</body>
</html>
